name: Code lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Install pnpm and the packages
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: true

      - name: Check code
        run: pnpm lint
